services:
  caddy:
    image: caddy:2-alpine
    container_name: sentra-caddy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  control:
    build: .
    image: sentra:latest
    container_name: sentra-control
    ports:
      - "172.17.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SENTRA_DB=/data/sentra.db
      - SENTRA_JWT_SECRET=${SENTRA_JWT_SECRET}
      - SENTRA_AUTH_TOKEN=${SENTRA_AUTH_TOKEN}
      - SENTRA_SERVER_ID=control
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      - SENTRA_DISABLE_AGENT=true
      - SENTRA_HOST_IP=66.135.2.77
      - SENTRA_ADMIN_EMAIL=${SENTRA_ADMIN_EMAIL}
      - SENTRA_ADMIN_PASSWORD=${SENTRA_ADMIN_PASSWORD}
      - SENTRA_SMTP_HOST=${SENTRA_SMTP_HOST}
      - SENTRA_SMTP_PORT=${SENTRA_SMTP_PORT}
      - SENTRA_SMTP_USER=${SENTRA_SMTP_USER}
      - SENTRA_SMTP_PASS=${SENTRA_SMTP_PASS}
      - SENTRA_ALERT_EMAIL=${SENTRA_ALERT_EMAIL}
      - SENTRA_WG_EASY_PASSWORD=${SENTRA_WG_EASY_PASSWORD}
    cap_add:
      - NET_ADMIN
    volumes:
      - sentra_data:/data
      - /lib/modules:/lib/modules:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped

  agent-1:
    build: .
    image: sentra:latest
    container_name: sentra-agent-1
    command: ./agent
    network_mode: "container:wg-easy"
    user: "root"
    environment:
      - SENTRA_CONTROL_URL=http://172.17.0.1:8080
      - SENTRA_AUTH_TOKEN=${SENTRA_AUTH_TOKEN}
      - SENTRA_SERVER_ID=los-angeles
      - SENTRA_WG_INTERFACE=wg0
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    cap_add:
      - NET_ADMIN
    volumes:
      - /lib/modules:/lib/modules:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  agent-2:
    build: .
    image: sentra:latest
    container_name: sentra-agent-2
    command: ./agent
    network_mode: "container:wg-easy-va"
    user: "root"
    environment:
      - SENTRA_CONTROL_URL=http://172.17.0.1:8080
      - SENTRA_AUTH_TOKEN=${SENTRA_AUTH_TOKEN}
      - SENTRA_SERVER_ID=virginia
      - SENTRA_WG_INTERFACE=wg0
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    cap_add:
      - NET_ADMIN
    volumes:
      - /lib/modules:/lib/modules:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  agent-3:
    build: .
    image: sentra:latest
    container_name: sentra-agent-3
    command: ./agent
    network_mode: "container:wg-easy-tx"
    user: "root"
    environment:
      - SENTRA_CONTROL_URL=http://172.17.0.1:8080
      - SENTRA_AUTH_TOKEN=${SENTRA_AUTH_TOKEN}
      - SENTRA_SERVER_ID=dallas
      - SENTRA_WG_INTERFACE=wg0
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
    cap_add:
      - NET_ADMIN
    volumes:
      - /lib/modules:/lib/modules:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  wstunnel:
    image: ghcr.io/erebe/wstunnel:latest
    container_name: sentra-wstunnel
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command:
      - /home/app/wstunnel
      - server
      - ws://0.0.0.0:8080
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

volumes:
  sentra_data:
    external: true
    name: sentra-v2_sentra_v2_data
  caddy_data:
  caddy_config:
